services:
  - type: web
    name: video-saas
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KIEAI_API_KEY
        sync: false
      - key: FAL_AI_API_KEY
        sync: false
      - key: AYRSHARE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
